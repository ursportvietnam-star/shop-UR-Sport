<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - Không tìm thấy trang</title>
    <meta name="robots" content="noindex" />
    <style>body{font-family:system-ui, sans-serif;margin:0;padding:0;display:flex;align-items:center;justify-content:center;height:100vh;background:#f7fafc;color:#1f2937;text-align:center}a{color:#2563eb;text-decoration:none;font-weight:700}</style>
  </head>
  <body>
    <div>
      <h1>404 - Không tìm thấy trang</h1>
      <p>Đang chuyển về trang chủ...</p>
      <p><a href="/">Quay về trang chủ</a></p>
    </div>
    <script type="text/javascript">
      // Dynamic Single Page Apps for GitHub Pages routing redirect
      var repoName = 'shop-UR-Sport';
      var pathSegments = window.location.pathname.split('/').filter(Boolean);
      var pathSegmentsToKeep = (pathSegments[0] === repoName) ? 1 : 0;

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </body>
</html>

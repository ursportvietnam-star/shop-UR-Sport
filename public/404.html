<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UR Sport</title>
    <meta name="robots" content="noindex" />
    <script type="text/javascript">
      (function () {
        // Dynamic Single Page Apps for GitHub Pages routing redirect.
        // Run before body paint so deep-link refreshes do not flash a visible 404 screen.
        var repoName = 'shop-UR-Sport';
        var pathSegments = window.location.pathname.split('/').filter(Boolean);
        var pathSegmentsToKeep = pathSegments[0] === repoName ? 1 : 0;
        var l = window.location;

        l.replace(
          l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
            l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
            l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
            (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
            l.hash
        );
      })();
    </script>
    <style>
      body {
        margin: 0;
        display: flex;
        min-height: 100vh;
        align-items: center;
        justify-content: center;
        background: #fff;
        color: #1e4b64;
        font-family: system-ui, sans-serif;
      }

      .loader {
        width: 42px;
        height: 42px;
        border: 4px solid #d9e7ef;
        border-top-color: #1e4b64;
        border-radius: 999px;
        animation: spin 0.8s linear infinite;
      }

      noscript {
        max-width: 420px;
        padding: 24px;
        text-align: center;
        color: #1f2937;
      }

      a {
        color: #1e4b64;
        font-weight: 800;
        text-decoration: none;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="loader" aria-label="Dang tai UR Sport"></div>
    <noscript>
      <h1>UR Sport</h1>
      <p>Trang can JavaScript de mo dung duong dan.</p>
      <p><a href="/">Quay ve trang chu</a></p>
    </noscript>
  </body>
</html>

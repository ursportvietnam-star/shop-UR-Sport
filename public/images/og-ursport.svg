<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">UR Sport - Logo chính thức</title>
  <desc id="desc">Branded UR Sport logo with clean typography and a strong tagline.</desc>
  <rect width="1200" height="630" fill="#f8fafc"/>
  <rect x="60" y="60" width="1080" height="510" rx="34" fill="#0f3144"/>
  <circle cx="1040" cy="140" r="90" fill="#16a34a" opacity=".92"/>
  <circle cx="1120" cy="505" r="150" fill="#38bdf8" opacity=".22"/>
  <g transform="translate(120 200)">
    <text x="0" y="0" font-family="Inter, Arial, sans-serif" font-size="180" font-weight="900" letter-spacing="-6">
      <tspan fill="#38bdf8">U</tspan>
      <tspan fill="#0f172a">R</tspan>
    </text>
    <text x="280" y="80" fill="#38bdf8" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="800" letter-spacing="6">SPORT</text>
    <line x1="0" y1="108" x2="1080" y2="108" stroke="#ffffff" stroke-width="4" opacity=".22"/>
    <text x="0" y="170" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700" letter-spacing="5">PHONG CÁCH THỂ THAO</text>
    <text x="0" y="220" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="600" letter-spacing="2">Thương hiệu đồ thể thao nam cao cấp</text>
  </g>
  <rect x="100" y="292" width="360" height="16" rx="8" fill="#ef4444" opacity=".85"/>
  <rect x="100" y="324" width="220" height="16" rx="8" fill="#f97316" opacity=".65"/>
</svg>

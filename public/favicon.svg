<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00a2ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#005a8d;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Rounded square with premium gradient -->
  <rect width="100" height="100" rx="24" fill="url(#bgGrad)"/>
  
  <!-- Bold, italicized "UR" with slight shadow for depth -->
  <text x="48" y="72" text-anchor="middle" 
        font-family="Arial Black, sans-serif" 
        font-weight="900" 
        font-style="italic" 
        font-size="62" 
        fill="white" 
        letter-spacing="-6"
        style="filter: drop-shadow(0px 2px 2px rgba(0,0,0,0.3))">
    UR
  </text>
  
  <!-- Subtle Registered symbol -->
  <circle cx="86" cy="22" r="7" fill="white" fill-opacity="0.9"/>
  <text x="86" y="25.5" text-anchor="middle" 
        font-family="Arial, sans-serif" 
        font-weight="900" 
        font-size="9" 
        fill="#005a8d">
    R
  </text>
</svg>
